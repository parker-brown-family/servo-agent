<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>servo-agent · a browser our agents can read</title>
<meta name="description" content="An agent-controllable browser, built on the Servo engine. Watch the robot read the live web and beam it onto your screen.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{ --orange:#ff8c00; --amber:#ffb43a; --hot:#fff0cf; --olive:#8bb43c; --ink:#191812; }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0; background:var(--ink); color:#e0dcd2; overflow:hidden;
    font-family:"Share Tech Mono","JetBrains Mono",monospace; -webkit-font-smoothing:antialiased;}
  .stage{position:fixed; inset:0; overflow:hidden}

  img.bg{position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; object-position:center; filter:saturate(1.04) contrast(1.03) brightness(.96);}
  canvas.flow{position:absolute; inset:0; width:100%; height:100%; pointer-events:none}

  .wash{position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(120% 90% at 50% 42%, transparent 44%, rgba(10,8,4,.55) 100%),
      linear-gradient(to bottom, rgba(12,9,4,.45), transparent 24%, transparent 56%, rgba(8,6,3,.85));}
  .scan{position:absolute; inset:0; pointer-events:none; mix-blend-mode:soft-light; opacity:.45;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.06) 0 1px, transparent 1px 3px);}

  /* HUD step strip — top center */
  .step{position:absolute; top:clamp(14px,3.4vh,34px); left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:.7em; white-space:nowrap;
    padding:.55em 1.1em; background:rgba(25,24,18,.62); backdrop-filter:blur(6px);
    border:1px solid rgba(107,142,35,.5); border-radius:3px;
    font-size:clamp(11px,1.5vw,15px); letter-spacing:.22em; text-transform:uppercase;
    color:#ffce8a; text-shadow:0 0 14px rgba(255,140,0,.5)}
  .step .n{color:var(--ink); background:var(--orange); border-radius:2px; padding:.05em .55em;
    font-weight:700; box-shadow:0 0 14px rgba(255,140,0,.7)}
  .step b{color:#e8e2d2}

  .ghost{position:absolute; right:clamp(16px,4vw,46px); top:clamp(14px,3vh,30px);
    font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#cbbfa0; opacity:.7; text-decoration:none;
    border:1px solid rgba(180,200,130,.3); padding:.5em .9em; border-radius:3px}
  .ghost:hover{opacity:1; border-color:var(--olive); color:var(--olive)}

  .copy{position:absolute; left:clamp(20px,5vw,80px); bottom:clamp(20px,6vh,66px);
    max-width:min(48ch,72vw); text-shadow:0 2px 18px rgba(0,0,0,.7)}
  .mark{font-weight:400; letter-spacing:1px; font-size:clamp(30px,5.4vw,62px); line-height:1; color:#fff; margin:0;
    text-shadow:0 0 22px rgba(255,140,0,.25)}
  .mark b{color:var(--orange); font-weight:400}
  .tag{margin:.55rem 0 0; font-size:clamp(14px,1.9vw,20px); color:#e7ddc6; opacity:.95; letter-spacing:.02em}
  .cta{margin-top:1.4rem; display:inline-flex; align-items:center; gap:.6em;
    padding:.85em 1.5em; border-radius:3px; text-decoration:none; text-transform:uppercase;
    font-size:clamp(12px,1.5vw,15px); letter-spacing:.12em; font-weight:700; color:#16130a;
    background:linear-gradient(135deg, rgba(255,140,0,.97), rgba(255,110,40,.9));
    border:1px solid rgba(255,160,40,.8);
    box-shadow:0 0 18px rgba(255,140,0,.5), inset 0 0 10px rgba(255,255,255,.14);
    transition:transform .12s ease, box-shadow .12s ease}
  .cta:hover{transform:translateY(-2px); box-shadow:0 0 30px rgba(255,140,0,.7), inset 0 0 14px rgba(255,255,255,.2)}
  .cta .arrow{font-size:1.15em}

  @media (prefers-reduced-motion:reduce){ .cta{transition:none} }
</style>
</head>
<body>
  <main class="stage" aria-label="servo-agent — a robot reads the live web and beams it onto a screen">
    <img class="bg" src="../assets/hero.png" alt="A retro robot cradles a glowing holographic globe and beams it from its eyes onto a vintage personal computer.">
    <canvas class="flow" aria-hidden="true"></canvas>
    <div class="wash"></div><div class="scan"></div>

    <a class="ghost" href="https://github.com/parker-brown-family/servo-agent">View on GitHub →</a>
    <div class="step" id="step"><span class="n">1</span> <span><b id="stepText">reads the live web</b></span></div>

    <div class="copy">
      <h1 class="mark"><b>servo</b>-agent</h1>
      <p class="tag">A browser our agents can read — the robot reads the live web and beams it onto your screen.</p>
      <a class="cta" href="../#use-cases"><span class="arrow">▸</span> Read how you can use it today</a>
    </div>
  </main>

<script>
/* "Follow the current" — orange, cartoonish, in five staged beats, using the
   markdown-delight /tv traveling-spark technique (canvas arc() + shadowBlur on
   a modulo-time loop), extended into a phase state-machine:
     1 intake  globe → robot head
     2 charge  builds up in the head
     3 beam    fans out from the eyes as vector beams onto the screen (~2s)
     4 gather  beams collapse back into a pulse, it falls to the keyboard
     5 type    keys clatter as the energy types its way back into the robot
   Nodes are normalized to the hero's intrinsic size and mapped through the same
   object-fit:cover transform, so everything stays glued to the artwork. */
(() => {
  const cv = document.querySelector('canvas.flow'), ctx = cv.getContext('2d');
  const stepN = document.querySelector('#step .n'), stepText = document.getElementById('stepText');
  const HERO_W = 1333, HERO_H = 1180;
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const CORE = '#fff0cf', AMBER = '#ffd089', ORANGE = '#ff8c00';

  // Scene nodes (normalized 0..1 of the hero composition).
  const web = [0.485,0.545], head = [0.275,0.205], eyes = [0.305,0.250],
        screen = [0.805,0.400], kbd = [0.620,0.852];
  // Beam fan targets across the curved glass.
  const beams = [[0.70,0.34],[0.74,0.30],[0.80,0.30],[0.86,0.31],[0.90,0.36],[0.88,0.46],[0.74,0.46]];
  // Keyboard keys (left → right).
  const keys = Array.from({length:10}, (_,i)=>[0.505 + i*0.0235, 0.852 + (i%2?0.006:0)]);

  const phases = [
    {k:'intake', d:1.1, n:'1', t:'reads the live web'},
    {k:'charge', d:0.9, n:'2', t:'its super-AI sees the page'},
    {k:'beam',   d:2.0, n:'3', t:'beams it onto your screen'},
    {k:'gather', d:0.8, n:'4', t:'you read it & follow links'},
    {k:'type',   d:1.6, n:'5', t:'…and it types back'},
  ];
  const TOTAL = phases.reduce((s,p)=>s+p.d,0);

  let dpr=1, cover=null, curStep='';
  function resize(){
    dpr = Math.min(devicePixelRatio||1, 2);
    cv.width = Math.floor(cv.clientWidth*dpr); cv.height = Math.floor(cv.clientHeight*dpr);
    const s = Math.max(cv.width/HERO_W, cv.height/HERO_H), dw=HERO_W*s, dh=HERO_H*s;
    cover = {ox:(cv.width-dw)/2, oy:(cv.height-dh)/2, dw, dh};
  }
  const P = n => [cover.ox+n[0]*cover.dw, cover.oy+n[1]*cover.dh];
  const lerp=(a,b,t)=>a+(b-a)*t, mix=(p,q,t)=>[lerp(p[0],q[0],t),lerp(p[1],q[1],t)];
  function qb(a,b,cp,t){const u=1-t;return [u*u*a[0]+2*u*t*cp[0]+t*t*b[0], u*u*a[1]+2*u*t*cp[1]+t*t*b[1]];}
  const easeOut=t=>1-(1-t)*(1-t), easeIn=t=>t*t, easeBack=t=>{const c=2.4;return 1+(--t)*t*((c+1)*t+c);};

  function blob(x,y,r,a,col){               // cartoonish layered glow blob
    ctx.globalAlpha=a; ctx.shadowColor=ORANGE;
    ctx.shadowBlur=30*dpr; ctx.fillStyle=col||ORANGE;
    ctx.beginPath(); ctx.arc(x,y,r*1.5*dpr,0,7); ctx.fill();
    ctx.shadowBlur=14*dpr; ctx.fillStyle=AMBER;
    ctx.beginPath(); ctx.arc(x,y,r*dpr,0,7); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle=CORE;
    ctx.beginPath(); ctx.arc(x,y,r*0.5*dpr,0,7); ctx.fill();
    ctx.globalAlpha=1;
  }
  function sparkles(x,y,r,seed,t){          // little orbiting sparks → cartoon energy
    for(let i=0;i<5;i++){ const ang=t*6 + i*1.257 + seed;
      const rr=(r*1.7 + Math.sin(t*9+i)*r*0.4)*dpr;
      blob(x+Math.cos(ang)*rr, y+Math.sin(ang)*rr, 1.6+Math.sin(t*12+i)*0.6, .8, CORE);
    }
  }

  function drawIntake(lt){
    const a=P(web), b=P(head), cp=P([0.33,0.40]);
    const p=qb(a,b,cp,easeOut(lt));
    blob(p[0],p[1], 5+lt*3, 1);
    if(lt>0.5) sparkles(p[0],p[1], 4, 1, lt*4);
  }
  function drawCharge(lt){
    const h=P(head); const grow=4 + easeBack(Math.min(1,lt*1.2))*7 + Math.sin(lt*22)*1.4;
    // charge rings
    for(let i=0;i<3;i++){ const rr=(8+i*9 + (lt*30)%30)*dpr;
      ctx.globalAlpha=(1-((lt*1+i*0.33)%1))*0.5; ctx.strokeStyle=ORANGE;
      ctx.lineWidth=2*dpr; ctx.shadowColor=ORANGE; ctx.shadowBlur=12*dpr;
      ctx.beginPath(); ctx.arc(h[0],h[1],rr,0,7); ctx.stroke(); ctx.shadowBlur=0; ctx.globalAlpha=1;
    }
    blob(h[0],h[1], grow, 1); sparkles(h[0],h[1], grow*0.8, 2, lt*5);
  }
  function drawBeam(lt){
    const e=P(eyes);
    const ext = easeOut(Math.min(1, lt*1.6));               // beams shoot out
    const fade = lt>0.8 ? (1-(lt-0.8)/0.2) : 1;             // begin to settle near the end
    ctx.lineCap='round';
    beams.forEach((tg,i)=>{
      const t2=P(tg), end=mix(e,t2, ext*(0.9+0.1*Math.sin(lt*20+i)));
      const flick=0.55+0.45*Math.abs(Math.sin(lt*16+i*1.3));
      ctx.globalAlpha=fade*flick; ctx.strokeStyle=AMBER; ctx.lineWidth=(2.6)*dpr;
      ctx.shadowColor=ORANGE; ctx.shadowBlur=16*dpr;
      ctx.beginPath(); ctx.moveTo(e[0],e[1]); ctx.lineTo(end[0],end[1]); ctx.stroke();
      blob(end[0],end[1], 2.4, fade*flick, AMBER);          // bright beam tip
    });
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    // hologram bloom on the curved glass
    const sc=P(screen);
    ctx.globalAlpha=0.18*ext*(0.7+0.3*Math.sin(lt*12)); ctx.fillStyle=ORANGE;
    ctx.shadowColor=ORANGE; ctx.shadowBlur=40*dpr;
    ctx.beginPath(); ctx.ellipse(sc[0],sc[1], cover.dw*0.12, cover.dh*0.13, 0,0,7); ctx.fill();
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    blob(e[0],e[1], 4.5, 1);                                 // source still lit at the eyes
  }
  function drawGather(lt){
    const e=P(eyes), sc=P(screen);
    // beams retract into the screen → a pulse forms there
    const ret=1-easeIn(lt);
    if(ret>0.02) beams.forEach((tg,i)=>{ const t2=P(tg), end=mix(e,t2,ret);
      ctx.globalAlpha=ret*0.5; ctx.strokeStyle=AMBER; ctx.lineWidth=2*dpr;
      ctx.beginPath(); ctx.moveTo(e[0],e[1]); ctx.lineTo(end[0],end[1]); ctx.stroke(); ctx.globalAlpha=1; });
    blob(sc[0],sc[1], 4+easeOut(lt)*5, 1); sparkles(sc[0],sc[1], 5, 3, lt*4);
  }
  function drawTypeAndFall(lt){
    const sc=P(screen), kb=P(kbd);
    if(lt<0.30){                                            // the pulse falls to the keyboard (with a bounce)
      const f=lt/0.30, cp=[lerp(screen[0],kbd[0],.5), 0.78];
      const p=qb(sc,kb,P(cp), f); blob(p[0],p[1], 6-f*1.5, 1);
    } else {                                                // keys clatter; energy types back up into the robot
      const u=(lt-0.30)/0.70;
      const idx=Math.min(keys.length-1, Math.floor(u*keys.length));
      keys.forEach((k,i)=>{ const kp=P(k); const hit=i===idx?1: (i<idx?0.25:0.12);
        const bump=i===idx? -4*dpr*Math.sin(((u*keys.length)%1)*Math.PI):0;
        ctx.globalAlpha=hit; ctx.fillStyle=i<=idx?ORANGE:'#caa86a'; ctx.shadowColor=ORANGE;
        ctx.shadowBlur=(i===idx?16:0)*dpr;
        ctx.fillRect(kp[0]-9*dpr, kp[1]-7*dpr+bump, 18*dpr, 12*dpr); ctx.shadowBlur=0; ctx.globalAlpha=1; });
      const kp=P(keys[idx]); blob(kp[0],kp[1], 5, 1);
      if(u>0.6){ const r=(u-0.6)/0.4, rp=qb(kb,P(head),P([0.42,0.62]), easeOut(r));
        blob(rp[0],rp[1], 5, r); }                          // streak back into the robot
    }
  }

  const draw = {intake:drawIntake, charge:drawCharge, beam:drawBeam, gather:drawGather, type:drawTypeAndFall};

  function frame(ms){
    let t=(ms/1000)%TOTAL, ph=phases[0], acc=0;
    for(const p of phases){ if(t < acc+p.d){ ph=p; break;} acc+=p.d; }
    const lt=(t-acc)/ph.d;
    ctx.clearRect(0,0,cv.width,cv.height);
    draw[ph.k](Math.max(0,Math.min(1,lt)));
    if(ph.k!==curStep){ curStep=ph.k; stepN.textContent=ph.n; stepText.textContent=ph.t; }
    if(!reduce) requestAnimationFrame(frame);
  }
  function start(){ resize(); frame(reduce?900:performance.now()); }   // reduce → a lit beam frame
  addEventListener('resize', ()=>{ resize(); if(reduce) frame(900); });
  const hero=document.querySelector('img.bg');
  if(hero.complete) start(); else hero.addEventListener('load', start);
})();
</script>
</body>
</html>
