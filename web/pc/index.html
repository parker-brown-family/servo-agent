<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>servo-agent · a browser our agents can read</title>
<meta name="description" content="An agent-controllable browser, built on the Servo engine. Watch the robot read the live web and beam it onto your screen.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{ --orange:#ff7a14; --amber:#ffbf52; --hot:#fff7e0; --olive:#9bca3e; --ink:#191812; }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0; background:var(--ink); color:#e0dcd2; overflow:hidden;
    font-family:"Share Tech Mono","JetBrains Mono",monospace; -webkit-font-smoothing:antialiased;}
  .stage{position:fixed; inset:0; overflow:hidden}

  /* the hero is drawn INTO a canvas with the exact same cover-transform the
     animation uses — so photo + energy stay pixel-aligned at every resolution,
     with no dependence on the browser's object-fit. */
  #hero{display:none}
  canvas.bg{position:absolute; inset:0; z-index:0; width:100%; height:100%;
    filter:saturate(1.12) contrast(1.05) brightness(.97);}
  .wash{position:absolute; inset:0; z-index:1; pointer-events:none;
    background:
      radial-gradient(120% 90% at 50% 42%, transparent 46%, rgba(10,8,4,.5) 100%),
      linear-gradient(to bottom, rgba(12,9,4,.42), transparent 24%, transparent 60%, rgba(8,6,3,.58));}
  .scan{position:absolute; inset:0; z-index:1; pointer-events:none; mix-blend-mode:soft-light; opacity:.45;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.06) 0 1px, transparent 1px 3px);}
  /* energy canvas glows ABOVE the vignette so the typing pond reads */
  canvas.flow{position:absolute; inset:0; z-index:2; width:100%; height:100%; pointer-events:none}
  .ghost,.step,.copy{z-index:3}

  /* HUD step strip — top center */
  .step{position:absolute; top:clamp(14px,3.4vh,34px); left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:.7em; white-space:nowrap;
    padding:.55em 1.1em; background:rgba(25,24,18,.62); backdrop-filter:blur(6px);
    border:1px solid rgba(107,142,35,.5); border-radius:3px;
    font-size:clamp(11px,1.5vw,15px); letter-spacing:.22em; text-transform:uppercase;
    color:#ffce8a; text-shadow:0 0 14px rgba(255,140,0,.5)}
  .step .n{color:var(--ink); background:var(--orange); border-radius:2px; padding:.05em .55em;
    font-weight:700; box-shadow:0 0 14px rgba(255,140,0,.7)}
  .step b{color:#e8e2d2}

  .ghost{position:absolute; right:clamp(16px,4vw,46px); top:clamp(14px,3vh,30px);
    font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#cbbfa0; opacity:.7; text-decoration:none;
    border:1px solid rgba(180,200,130,.3); padding:.5em .9em; border-radius:3px}
  .ghost:hover{opacity:1; border-color:var(--olive); color:var(--olive)}

  .copy{position:absolute; left:clamp(20px,5vw,80px); bottom:clamp(20px,6vh,66px);
    max-width:min(48ch,72vw); text-shadow:0 2px 18px rgba(0,0,0,.7)}
  .mark{font-weight:400; letter-spacing:1px; font-size:clamp(30px,5.4vw,62px); line-height:1; color:#fff; margin:0;
    text-shadow:0 0 22px rgba(255,140,0,.25)}
  .mark b{color:var(--orange); font-weight:400}
  .tag{margin:.55rem 0 0; font-size:clamp(14px,1.9vw,20px); color:#e7ddc6; opacity:.95; letter-spacing:.02em}
  .cta{margin-top:1.4rem; display:inline-flex; align-items:center; gap:.6em;
    padding:.85em 1.5em; border-radius:3px; text-decoration:none; text-transform:uppercase;
    font-size:clamp(12px,1.5vw,15px); letter-spacing:.12em; font-weight:700; color:#16130a;
    background:linear-gradient(135deg, rgba(255,140,0,.97), rgba(255,110,40,.9));
    border:1px solid rgba(255,160,40,.8);
    box-shadow:0 0 18px rgba(255,140,0,.5), inset 0 0 10px rgba(255,255,255,.14);
    transition:transform .12s ease, box-shadow .12s ease}
  .cta:hover{transform:translateY(-2px); box-shadow:0 0 30px rgba(255,140,0,.7), inset 0 0 14px rgba(255,255,255,.2)}
  .cta .arrow{font-size:1.15em}

  @media (prefers-reduced-motion:reduce){ .cta{transition:none} }
</style>
</head>
<body>
  <main class="stage" aria-label="servo-agent — a robot reads the live web and beams it onto a screen">
    <img id="hero" src="/assets/hero.png" alt="A retro robot cradles a glowing holographic globe and beams it from its eyes onto a vintage personal computer.">
    <canvas class="bg" id="bg" aria-hidden="true"></canvas>
    <div class="wash"></div><div class="scan"></div>
    <canvas class="flow" aria-hidden="true"></canvas>

    <a class="ghost" href="https://github.com/parker-brown-family/servo-agent">View on GitHub →</a>
    <div class="step" id="step"><span class="n">1</span> <span><b id="stepText">Work with your agentic workflow</b></span></div>

    <div class="copy">
      <h1 class="mark"><b>servo</b>-agent</h1>
      <p class="tag"><b style="color:var(--orange)">Easy as 1 · 2 · 3</b> — your agentic workflow, on a web engine you own.</p>
      <a class="cta" href="/info/#use-cases"><span class="arrow">▸</span> Read how you can use it today</a>
    </div>
  </main>

<script>
/* "Easy as 1-2-3" — orange, cartoonish energy, using the markdown-delight /tv
   traveling-spark technique (canvas arc() + shadowBlur on a modulo-time loop),
   driven by a phase state-machine of three story beats (+ short travels):
     1 type    keys clatter; orange pebbles ripple across the keyboard (3s)
     2 charge  energy builds in the robot's head, dramatically (3.5s)
     3 beam    vector beams fan from the eyes; hologram holds on the screen (5s)
   then the pulse falls back to the keyboard and it loops. Nodes are normalized
   to the hero's intrinsic size and mapped through the same object-fit:cover
   transform, so everything stays glued to the artwork. */
(() => {
  const cv = document.querySelector('canvas.flow'), ctx = cv.getContext('2d');
  const bg = document.getElementById('bg'), bgctx = bg.getContext('2d');
  const hero = document.getElementById('hero');
  const stepN = document.querySelector('#step .n'), stepText = document.getElementById('stepText');
  const HERO_W = 1333, HERO_H = 1180;
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  // punched-up tactical-orange energy palette — more vivid, still on-brand
  const CORE = '#fff7e0', AMBER = '#ffbf52', ORANGE = '#ff7a14';

  // Scene nodes (normalized 0..1 of the hero art). Calibrated by measuring the
  // 1333×1180 hero pixel-by-pixel (divide px by 1333 / 1180), so the cover-mapping
  // keeps them glued at every resolution. NB: wide/desktop viewports crop the very
  // top & bottom (object-fit:cover) — at 16:9 only y∈[0.18,0.82] is visible — so the
  // keys ride the BACK/UPPER key rows (≲0.815), never the cropped front edge.
  const web = [0.485,0.545],
        head = [0.205,0.222],      // the round concentric "ear" disc on the head's left — atomic charge sits here
        eyes = [0.335,0.224],      // the bright glowing projector eye-lens — beams originate exactly here
        screen = [0.795,0.320],    // centre of the holographic globe on the CRT
        kbd = [0.640,0.795];
  // exactly THREE eye beams that drain the brain energy across the screen face
  const beams = [[0.735,0.300],[0.870,0.360],[0.800,0.450]];
  // Keyboard keys (left → right) ride the perspective tilt of the real key-tops:
  // back-left higher, front-right lower — all above the 16:9 bottom crop (~0.818).
  const keys = Array.from({length:10}, (_,i)=>{
    const f = i/9; return [0.535 + f*0.210, 0.775 + f*0.040 + (i%2?0.004:0)];
  });
  // Deterministic "plinky-clickity" pebble schedule for the typing pond.
  const pebbles = (() => {
    const out=[]; let t=0.02;
    while(t < 0.96){
      out.push({t0:t, k:Math.floor(Math.random()*keys.length),
                jx:(Math.random()-0.5)*0.028, jy:(Math.random()-0.62)*0.018,  // scatter, biased up onto the keys
                max:0.045 + Math.random()*0.04, life:0.30 + Math.random()*0.16});
      t += 0.022 + Math.random()*0.038;        // fast plinky-clickity cadence over 3s
    }
    return out;
  })();

  // Easy as 1-2-3: type → charge in the head → beam onto the screen → (loop).
  const phases = [
    {k:'type',      d:3.0, n:'1', t:'Work with your agentic workflow'},
    {k:'toHead',    d:0.9, n:'2', t:'Agent uses servo!'},
    {k:'charge',    d:5.0, n:'2', t:'Agent uses servo!'},
    {k:'brainToEye',d:0.8, n:'2', t:'Agent uses servo!'},
    {k:'beam',      d:5.0, n:'3', t:'…and reads the live web for you'},
    {k:'toKbd',     d:1.1, n:'1', t:'Work with your agentic workflow'},
  ];
  const TOTAL = phases.reduce((s,p)=>s+p.d,0);

  let dpr=1, cover=null, curStep='', T=0;   // T = global seconds, for continuous/smooth spins
  function resize(){
    dpr = Math.min(devicePixelRatio||1, 2);
    cv.width = Math.floor(cv.clientWidth*dpr); cv.height = Math.floor(cv.clientHeight*dpr);
    bg.width = cv.width; bg.height = cv.height;
    const s = Math.max(cv.width/HERO_W, cv.height/HERO_H), dw=HERO_W*s, dh=HERO_H*s;
    cover = {ox:(cv.width-dw)/2, oy:(cv.height-dh)/2, dw, dh};
    drawBg();
  }
  function drawBg(){   // the photo, drawn with the SAME cover transform as the animation
    if(!cover || !hero.naturalWidth) return;
    bgctx.clearRect(0,0,bg.width,bg.height);
    bgctx.drawImage(hero, cover.ox, cover.oy, cover.dw, cover.dh);
  }
  const P = n => [cover.ox+n[0]*cover.dw, cover.oy+n[1]*cover.dh];
  const lerp=(a,b,t)=>a+(b-a)*t, mix=(p,q,t)=>[lerp(p[0],q[0],t),lerp(p[1],q[1],t)];
  function qb(a,b,cp,t){const u=1-t;return [u*u*a[0]+2*u*t*cp[0]+t*t*b[0], u*u*a[1]+2*u*t*cp[1]+t*t*b[1]];}
  const easeOut=t=>1-(1-t)*(1-t), easeIn=t=>t*t, easeBack=t=>{const c=2.4;return 1+(--t)*t*((c+1)*t+c);};

  function blob(x,y,r,a,col){               // cartoonish layered glow blob
    ctx.globalAlpha=a; ctx.shadowColor=ORANGE;
    ctx.shadowBlur=30*dpr; ctx.fillStyle=col||ORANGE;
    ctx.beginPath(); ctx.arc(x,y,r*1.5*dpr,0,7); ctx.fill();
    ctx.shadowBlur=14*dpr; ctx.fillStyle=AMBER;
    ctx.beginPath(); ctx.arc(x,y,r*dpr,0,7); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle=CORE;
    ctx.beginPath(); ctx.arc(x,y,r*0.5*dpr,0,7); ctx.fill();
    ctx.globalAlpha=1;
  }
  function sparkles(x,y,r,seed,t){          // little orbiting sparks → cartoon energy
    for(let i=0;i<5;i++){ const ang=t*6 + i*1.257 + seed;
      const rr=(r*1.7 + Math.sin(t*9+i)*r*0.4)*dpr;
      blob(x+Math.cos(ang)*rr, y+Math.sin(ang)*rr, 1.6+Math.sin(t*12+i)*0.6, .8, CORE);
    }
  }
  const easeInOut=t=>t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
  const popc=n=>{let c=0;while(n){c+=n&1;n>>=1;}return c;};

  // the "Children of Atom" emblem — a bright orb, a sunburst fan of radiating
  // SHINE spikes, and THREE orbital rings (ellipses) at DISTINCT tilt angles, each
  // carrying a glowing electron bead. R = size, I = intensity 0..1 (grows while
  // charging, DRAINS to 0). Three tilted orbits (own rotation + own foreshorten).
  const ORBITS = [                          // [in-plane tilt, foreshorten ratio, spin rate]
    [0.0,          0.30, 1.30],
    [Math.PI/3,    0.66, -1.05],
    [2*Math.PI/3,  0.44,  1.65],
  ];
  function drawAtom(hx,hy,R,I,t){
    // 1) SUNBURST — long radiating shine spikes (the emblem's signature rays)
    for(let i=0;i<20;i++){ const a=(i/20)*Math.PI*2 + t*0.5;
      const big=i%5===0;                                   // every 5th ray is a long major spike
      const len=(R*(big?0.62:0.34) + (0.5+0.5*Math.sin(t*22+i))*R*0.55)*(0.6+1.1*I);
      ctx.globalAlpha=(big?0.5:0.32)+0.5*I; ctx.strokeStyle=big?CORE:(i%2?AMBER:ORANGE);
      ctx.lineWidth=((big?2.4:1.4)+I*2.6)*dpr; ctx.lineCap='round';
      ctx.shadowColor=ORANGE; ctx.shadowBlur=(12+I*54)*dpr;
      ctx.beginPath(); ctx.moveTo(hx+Math.cos(a)*R*0.22, hy+Math.sin(a)*R*0.22);
      ctx.lineTo(hx+Math.cos(a)*(R*0.22+len), hy+Math.sin(a)*(R*0.22+len)); ctx.stroke(); }
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    // 2) THREE tilted orbital rings + an electron riding each
    ctx.save(); ctx.translate(hx,hy);
    ORBITS.forEach(([tilt,fore,spin],i)=>{
      ctx.save(); ctx.rotate(tilt + t*0.25 + Math.sin(t*3+i)*0.08);
      ctx.globalAlpha=0.45+0.55*I; ctx.strokeStyle=i===1?AMBER:ORANGE; ctx.lineWidth=(2.4+I*3.6)*dpr;
      ctx.shadowColor=ORANGE; ctx.shadowBlur=(18+I*58)*dpr;
      ctx.beginPath(); ctx.ellipse(0,0,R,R*fore,0,0,7); ctx.stroke();
      const ea=t*spin + i*2.1;                              // electron position on this orbit
      const ex=Math.cos(ea)*R, ey=Math.sin(ea)*R*fore;
      ctx.restore();
      // bead drawn in atom-space (un-rotated) so its glow blob stays circular
      const cs=Math.cos(tilt + t*0.25 + Math.sin(t*3+i)*0.08), sn=Math.sin(tilt + t*0.25 + Math.sin(t*3+i)*0.08);
      blob(hx + ex*cs - ey*sn, hy + ex*sn + ey*cs, (2.2+I*4.2), 1, i===1?CORE:AMBER);
    });
    ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
    // 3) the blazing nucleus orb (~3× bigger / brighter build than before)
    blob(hx,hy, Math.max(2, 5 + I*84 + Math.sin(t*26)*(1+I*10)), 1);
    sparkles(hx,hy, R*0.34+5, 2, t*7);
  }

  function drawToHead(lt){                                  // energy rides keyboard → robot head
    const kb=P(kbd), h=P(head), cp=P([0.40,0.56]), f=easeOut(lt), p=qb(kb,h,cp,f);
    ctx.globalAlpha=0.32; ctx.strokeStyle=AMBER; ctx.lineWidth=2.2*dpr; ctx.shadowColor=ORANGE; ctx.shadowBlur=10*dpr;
    ctx.beginPath(); ctx.moveTo(kb[0],kb[1]); ctx.quadraticCurveTo(cp[0],cp[1], p[0],p[1]); ctx.stroke();
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    blob(p[0],p[1], 5, 1); sparkles(p[0],p[1], 4, 7, lt*4);
  }
  function drawCharge(lt){              // STEP 2 — energy builds in the head as an atomic burst (3.5s)
    const h=P(head), I=easeIn(lt);
    const R=(18 + I*88 + Math.sin(lt*30)*(4+I*12))*dpr;   // the atom builds dramatically on the ear disc
    drawAtom(h[0],h[1], R, I, T);
  }
  function drawBrainToEye(lt){          // the charged brain energy slides from the ear over to the eyes
    const ear=P(head), eye=P(eyes), f=easeInOut(lt);
    const arc=Math.sin(f*Math.PI)*cover.dh*0.025;
    for(let k=5;k>=1;k--){ const ff=Math.max(0,f-k*0.05);
      const tx=lerp(ear[0],eye[0],ff), ty=lerp(ear[1],eye[1],ff)-Math.sin(ff*Math.PI)*cover.dh*0.025;
      blob(tx,ty, 7-k, 0.10*(6-k)); }
    drawAtom(lerp(ear[0],eye[0],f), lerp(ear[1],eye[1],f)-arc, (106 - f*16)*dpr, 1-0.08*f, T);  // carries the charged atom over
  }
  function drawBeam(lt){                  // STEP 3 — 3 eye beams DRAIN the brain energy onto the screen
    const e=P(eyes), sc=P(screen);
    const ext = lt<0.14 ? easeOut(lt/0.14) : 1;             // beams shoot out, then hold
    const drain = Math.max(0, 1-lt);                        // brain energy depletes 1 → 0
    const fill = lt;                                        // the screen orb fills 0 → 1
    ctx.lineCap='round';
    beams.forEach((tg,i)=>{ const t2=P(tg), end=mix(e,t2,ext);
      const flick=0.65+0.35*Math.abs(Math.sin(T*12+i*2));
      ctx.globalAlpha=flick; ctx.strokeStyle=AMBER; ctx.lineWidth=3.2*dpr;
      ctx.shadowColor=ORANGE; ctx.shadowBlur=16*dpr;
      ctx.beginPath(); ctx.moveTo(e[0],e[1]); ctx.lineTo(end[0],end[1]); ctx.stroke();
      blob(end[0],end[1], 2.6, flick, AMBER);
      const pp=mix(e,end, (T*0.55 + i*0.33)%1); blob(pp[0],pp[1], 2.6, 0.9, CORE);   // energy packet draining out
    });
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    // an orange hologram bloom + a render scan-line resolve on the CRT as energy drains in
    ctx.globalAlpha=0.18*fill*(0.7+0.3*Math.sin(T*10)); ctx.fillStyle=ORANGE;
    ctx.shadowColor=ORANGE; ctx.shadowBlur=40*dpr;
    ctx.beginPath(); ctx.ellipse(sc[0],sc[1], cover.dw*0.12*fill, cover.dh*0.13*fill, 0,0,7); ctx.fill();
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    const sy=sc[1]-cover.dh*0.11 + ((T*1.8)%1)*cover.dh*0.22;
    ctx.globalAlpha=0.4*fill; ctx.strokeStyle=CORE; ctx.lineWidth=2*dpr;
    ctx.beginPath(); ctx.moveTo(sc[0]-cover.dw*0.10, sy); ctx.lineTo(sc[0]+cover.dw*0.10, sy); ctx.stroke();
    ctx.globalAlpha=1;
    if(drain>0.02) drawAtom(e[0],e[1], (8 + drain*100)*dpr, drain, T);  // the eye atom drains as beams fire
    blob(sc[0],sc[1], 3 + fill*7, 1);                                   // the orb coalescing on the screen
  }
  function drawToKbd(lt){                 // STEP back to 1 — the screen orb floats down and disperses into the keys
    const sc=P(screen), kb=P(kbd);
    if(lt<0.5){                                            // float gently down
      const f=easeIn(lt/0.5), p=qb(sc,kb,P([0.72,0.62]), f);
      blob(p[0],p[1], 7-f*1.5, 1); sparkles(p[0],p[1], 4, 3, T*4);
    } else {                                               // burst and ripple across the keys
      const u=(lt-0.5)/0.5; blob(kb[0],kb[1], 6*(1-u)+1, 1);
      keys.forEach((k)=>{ const kp=P(k), d=Math.abs(kp[0]-kb[0])/(cover.dw*0.16);
        const a=u - d*0.4; if(a<0) return; const f=Math.min(1,a/0.6), R=f*0.05*cover.dw;
        ctx.globalAlpha=(1-f)*0.6; ctx.strokeStyle=ORANGE; ctx.lineWidth=(2.4*(1-f)+0.4)*dpr;
        ctx.shadowColor=ORANGE; ctx.shadowBlur=8*dpr;
        ctx.beginPath(); ctx.arc(kp[0],kp[1], R,0,7); ctx.stroke(); ctx.shadowBlur=0; ctx.globalAlpha=1;
        if(f<0.3) blob(kp[0],kp[1], 2.4*(1-f/0.3)+0.6, 1); });
    }
  }
  function drawType(lt){                                    // ~3s: fingers fly, orange pebbles ripple in a pond
    const hot=new Set();
    for(const pb of pebbles){ const a=lt-pb.t0; if(a>=0 && a<0.11) hot.add(pb.k); }
    keys.forEach((k,i)=>{ const kp=P(k), on=hot.has(i);    // keys clatter as they're struck
      ctx.globalAlpha=on?1:0.15; ctx.fillStyle=on?ORANGE:'#9c8a5e';
      ctx.shadowColor=ORANGE; ctx.shadowBlur=(on?14:0)*dpr;
      ctx.fillRect(kp[0]-8.5*dpr, kp[1]-6.5*dpr-(on?2*dpr:0), 17*dpr, 11*dpr);
      ctx.shadowBlur=0; ctx.globalAlpha=1; });
    for(const pb of pebbles){ const a=lt-pb.t0; if(a<0 || a>pb.life) continue;
      const k=keys[pb.k], f=a/pb.life, c=P([k[0]+pb.jx, k[1]+pb.jy]), R=f*pb.max*cover.dw;   // ripple
      ctx.globalAlpha=(1-f)*0.65; ctx.strokeStyle=ORANGE; ctx.lineWidth=(2.6*(1-f)+0.5)*dpr;
      ctx.shadowColor=ORANGE; ctx.shadowBlur=9*dpr;
      ctx.beginPath(); ctx.arc(c[0],c[1],R,0,7); ctx.stroke();
      if(f<0.55){ ctx.globalAlpha=(0.55-f)*1.1; ctx.beginPath(); ctx.arc(c[0],c[1],R*0.55,0,7); ctx.stroke(); }
      ctx.shadowBlur=0; ctx.globalAlpha=1;
      if(f<0.20) blob(c[0],c[1], 3.0*(1-f/0.20)+0.8, 1);   // the splash where the pebble lands
    }
  }
  const draw = {type:drawType, toHead:drawToHead, charge:drawCharge,
                brainToEye:drawBrainToEye, beam:drawBeam, toKbd:drawToKbd};

  function frame(ms){
    T = ms/1000;
    let t=(ms/1000)%TOTAL, ph=phases[0], acc=0;
    for(const p of phases){ if(t < acc+p.d){ ph=p; break;} acc+=p.d; }
    const lt=(t-acc)/ph.d;
    ctx.clearRect(0,0,cv.width,cv.height);
    draw[ph.k](Math.max(0,Math.min(1,lt)));
    if(ph.k!==curStep){ curStep=ph.k; stepN.textContent=ph.n; stepText.textContent=ph.t; }
    if(!reduce) requestAnimationFrame(frame);
  }
  function start(){ resize(); frame(reduce?9000:performance.now()); }   // reduce → a lit beam frame
  addEventListener('resize', ()=>{ resize(); if(reduce) frame(9000); });
  // decode the hero first so the photo is ready from frame 1
  const dec = im => (im.decode ? im.decode().catch(()=>0) : Promise.resolve());
  Promise.resolve(dec(hero)).then(start);
})();
</script>
</body>
</html>
