name: Bug report
description: Report a problem with servo-agent
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please do not report security issues here — see SECURITY.md.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal sequence (commands, URL, code) that reproduces it.
      placeholder: |
        1. servo-agent selftest https://...
        2. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, servo-agent version, and servoshell build (debug/release).
      placeholder: |
        - OS:
        - Python:
        - servo-agent:
        - servoshell:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
