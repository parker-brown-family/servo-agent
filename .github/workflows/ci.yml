name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync deps
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Tests (unit; integration auto-skips without a servoshell binary)
        run: uv run pytest -v

  # Full integration tests need a built servoshell. Servo's own build is heavy,
  # so we gate it behind a manual dispatch / self-hosted runner rather than
  # building the engine on every push.
  integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, servo]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Integration tests
        env:
          SERVOSHELL: ${{ env.SERVOSHELL }}
        run: uv run pytest -v -m integration
